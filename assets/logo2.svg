<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Generic real estate app icon: house with door and windows -->
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A84FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient2)"/>

  <!-- House structure -->
  <g transform="translate(100, 100)">
    <!-- Roof (triangle) -->
    <polygon points="0,-50 -60,20 60,20" fill="#FFFFFF" opacity="0.9"/>

    <!-- House body (rectangle) -->
    <rect x="-50" y="20" width="100" height="60" fill="#FFFFFF" opacity="0.85" rx="4"/>

    <!-- Door -->
    <rect x="-15" y="40" width="30" height="40" fill="#0A84FF" opacity="0.7" rx="2"/>
    <circle cx="12" cy="60" r="2" fill="#FFFFFF"/>

    <!-- Window 1 -->
    <rect x="-45" y="30" width="18" height="18" fill="#87CEEB" opacity="0.8" rx="1"/>
    <line x1="-36" y1="30" x2="-36" y2="48" stroke="#0A84FF" stroke-width="1" opacity="0.6"/>
    <line x1="-45" y1="39" x2="-27" y2="39" stroke="#0A84FF" stroke-width="1" opacity="0.6"/>

    <!-- Window 2 -->
    <rect x="27" y="30" width="18" height="18" fill="#87CEEB" opacity="0.8" rx="1"/>
    <line x1="36" y1="30" x2="36" y2="48" stroke="#0A84FF" stroke-width="1" opacity="0.6"/>
    <line x1="27" y1="39" x2="45" y2="39" stroke="#0A84FF" stroke-width="1" opacity="0.6"/>
  </g>
</svg>