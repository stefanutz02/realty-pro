<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Splash screen icon: larger generic house -->
  <defs>
    <linearGradient id="splashGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A84FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="256" height="256" fill="url(#splashGradient)"/>

  <g transform="translate(128, 128)">
    <!-- Roof -->
    <polygon points="0,-70 -90,40 90,40" fill="#FFFFFF" opacity="0.95"/>

    <!-- House body -->
    <rect x="-80" y="40" width="160" height="100" fill="#FFFFFF" opacity="0.9" rx="8"/>

    <!-- Door -->
    <rect x="-25" y="60" width="50" height="70" fill="#0A84FF" opacity="0.8" rx="4"/>
    <circle cx="20" cy="95" r="4" fill="#FFFFFF"/>

    <!-- Window 1 -->
    <rect x="-70" y="55" width="30" height="30" fill="#87CEEB" opacity="0.9" rx="2"/>
    <line x1="-55" y1="55" x2="-55" y2="85" stroke="#0A84FF" stroke-width="2" opacity="0.6"/>
    <line x1="-70" y1="70" x2="-40" y2="70" stroke="#0A84FF" stroke-width="2" opacity="0.6"/>

    <!-- Window 2 -->
    <rect x="40" y="55" width="30" height="30" fill="#87CEEB" opacity="0.9" rx="2"/>
    <line x1="55" y1="55" x2="55" y2="85" stroke="#0A84FF" stroke-width="2" opacity="0.6"/>
    <line x1="40" y1="70" x2="70" y2="70" stroke="#0A84FF" stroke-width="2" opacity="0.6"/>
  </g>
</svg>