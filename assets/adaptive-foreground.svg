<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Adaptive icon foreground: just the house shape without background -->
  <defs>
    <linearGradient id="adaptiveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A84FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(128, 128)">
    <!-- Roof -->
    <polygon points="0,-70 -90,40 90,40" fill="url(#adaptiveGradient)"/>

    <!-- House body -->
    <rect x="-80" y="40" width="160" height="100" fill="url(#adaptiveGradient)" rx="8"/>

    <!-- Door -->
    <rect x="-25" y="60" width="50" height="70" fill="#FFFFFF" opacity="0.3" rx="4"/>
    <circle cx="20" cy="95" r="4" fill="#FFFFFF" opacity="0.4"/>

    <!-- Window 1 -->
    <rect x="-70" y="55" width="30" height="30" fill="#FFFFFF" opacity="0.25" rx="2"/>
    <line x1="-55" y1="55" x2="-55" y2="85" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
    <line x1="-70" y1="70" x2="-40" y2="70" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>

    <!-- Window 2 -->
    <rect x="40" y="55" width="30" height="30" fill="#FFFFFF" opacity="0.25" rx="2"/>
    <line x1="55" y1="55" x2="55" y2="85" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
    <line x1="40" y1="70" x2="70" y2="70" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  </g>
</svg>