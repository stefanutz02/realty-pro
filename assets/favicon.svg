<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Generic favicon: simplified house icon -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A84FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="64" height="64" fill="url(#iconGradient)"/>

  <g transform="translate(32, 32)">
    <!-- Roof -->
    <polygon points="0,-16 -20,8 20,8" fill="#FFFFFF" opacity="0.95"/>

    <!-- House body -->
    <rect x="-16" y="8" width="32" height="20" fill="#FFFFFF" opacity="0.9" rx="2"/>

    <!-- Door -->
    <rect x="-5" y="14" width="10" height="14" fill="#0A84FF" opacity="0.8" rx="1"/>

    <!-- Window -->
    <rect x="-14" y="12" width="6" height="6" fill="#87CEEB" opacity="0.9" rx="1"/>
    <rect x="8" y="12" width="6" height="6" fill="#87CEEB" opacity="0.9" rx="1"/>
  </g>
</svg>